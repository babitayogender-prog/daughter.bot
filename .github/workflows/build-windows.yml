name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r background_requirements.txt
        pip install pyinstaller
    
    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --windowed `
          --name "DaughterBot" `
          --icon=icon.ico `
          --add-data "personality_responses.json:." `
          --add-data "config.json:." `
          background_voice_bot.py
      shell: powershell
    
    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          # DaughterBot - Windows 8/8.1+ Application
          
          ## What's Included:
          - ✅ System tray voice bot
          - ✅ Emma's personality (interactive)
          - ✅ LiveKit integration
          - ✅ Memory & chat history
          
          ## How to Use:
          1. Download `DaughterBot.exe`
          2. Run the installer
          3. Enter your LiveKit credentials
          4. Chat with Emma!
          
          ## Requirements:
          - Windows 8, 8.1, 10, or 11
          - Internet connection
          - Microphone & speakers
          
          **Built automatically from latest source code**
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/DaughterBot.exe
        asset_name: DaughterBot.exe
        asset_content_type: application/octet-stream
    
    - name: Upload to Release (Backup)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/DaughterBot.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
