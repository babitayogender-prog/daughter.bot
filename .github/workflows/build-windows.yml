name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r background_requirements.txt
        pip install pyinstaller
    
    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --windowed `
          --name "DaughterBot" `
          --add-data "personality_responses.json:." `
          --add-data "config.json:." `
          background_voice_bot.py
      shell: powershell
    
    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          # DaughterBot - Windows 8/8.1+ Application
          
          Download DaughterBot.exe and run!
          Enter your LiveKit credentials to start.
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/DaughterBot.exe
        asset_name: DaughterBot.exe
        asset_content_type: application/octet-stream
