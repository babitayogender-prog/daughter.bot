name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r background_requirements.txt
        pip install pyinstaller
    
    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --windowed `
          --name "DaughterBot" `
          --add-data "personality_responses.json:." `
          --add-data "config.json:." `
          background_voice_bot.py
      shell: powershell
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/DaughterBot.exe
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          # DaughterBot - Windows 8/8.1+ Application
          
          ## What's Included:
          - ✅ System tray voice bot
          - ✅ Emma's personality (interactive)
          - ✅ LiveKit integration
          - ✅ Memory & chat history
          - ✅ Windows 8/8.1 compatible
          
          ## How to Use:
          1. Download **DaughterBot.exe**
          2. Run the file
          3. Enter your LiveKit credentials on first run
          4. Right-click system tray icon → "Start Listening"
          5. Chat with Emma!
          
          ## Requirements:
          - Windows 8, 8.1, 10, or 11
          - Internet connection
          - Microphone & speakers
          - LiveKit account (free at https://livekit.io)
          
          **Built automatically from latest source code**
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
